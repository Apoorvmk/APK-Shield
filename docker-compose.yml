services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./backend:/app
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MOBSF_API_KEY=${MOBSF_API_KEY}
    depends_on:
      - mobsf

  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    ports:
      - "8008:8008"
    volumes:
      - ./mobsf:/home/mobsf/.MobSF

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend